<!DOCTYPE html>
<html>
<head>
    <title>Simple Spline Test</title>
    <style>
        body { padding: 20px; font-family: Arial; }
        .container { width: 800px; height: 600px; border: 2px solid #333; margin: 20px 0; }
        canvas { width: 100%; height: 100%; display: block; }
        #status { padding: 10px; background: #f0f0f0; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Simple Spline Test</h1>
    <div id="status">Loading...</div>
    
    <div class="container">
        <canvas id="canvas1"></canvas>
    </div>
    
    <script>
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas1');
        const url = 'https://cdn.prod.website-files.com/675835c7f4ae1fa1a79b3733/headless.splinecode';
        
        function updateStatus(msg, isError) {
            status.textContent = msg;
            status.style.color = isError ? 'red' : 'green';
            console.log(msg);
        }
        
        // Load Spline runtime
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@splinetool/runtime@1.0.0/build/runtime.js';
        
        script.onload = function() {
            updateStatus('Spline runtime script loaded, checking Application...');
            
            setTimeout(function() {
                if (typeof window.Application === 'undefined') {
                    updateStatus('ERROR: Application class not found after loading runtime', true);
                    return;
                }
                
                updateStatus('Application class found! Creating instance...');
                
                try {
                    canvas.width = 800;
                    canvas.height = 600;
                    
                    const app = new window.Application(canvas);
                    updateStatus('Application instance created! Loading model...');
                    
                    app.load(url).then(function() {
                        updateStatus('SUCCESS! Model loaded and should be visible!', false);
                    }).catch(function(error) {
                        updateStatus('ERROR loading model: ' + error.message, true);
                        console.error('Full error:', error);
                    });
                } catch (error) {
                    updateStatus('ERROR creating Application: ' + error.message, true);
                    console.error('Full error:', error);
                }
            }, 500);
        };
        
        script.onerror = function() {
            updateStatus('ERROR: Failed to load Spline runtime script', true);
        };
        
        document.head.appendChild(script);
    </script>
</body>
</html>
